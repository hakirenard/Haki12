<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Mini Oyun</title>
    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
            background-color: #222;
            color: white;
        }
        button {
            padding: 20px;
            font-size: 20px;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>🎮 Tıklama Oyunu</h1>
    <p>Puan: <span id="puan">0</span></p>
    <button onclick="tikla()">Tıkla!</button>

    <script>
        let puan = 0;

        function tikla() {
            puan++;
            document.getElementById("puan").innerText = puan;
        }
    </script>

</body>
</html>
